<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Timetable & Description</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-warm: #FFF9F2;
            --accent-orange: #F28482;
            --text-dark: #4A4A4A;
            --white: #FFFFFF;
            --soft-gray: #f8fafc;
            --deep-orange: #E56B6F;
            --info-blue: #457B9D;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-warm);
            color: var(--text-dark);
            padding: 1rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--white);
            padding: 2rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            position: relative;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--info-blue);
            font-weight: 600;
            font-size: 0.9rem;
            transition: transform 0.2s;
            margin-bottom: 1.5rem;
        }
        .back-btn:hover { transform: translateX(-5px); }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 { color: var(--deep-orange); font-size: 1.5rem; margin-bottom: 0.5rem; line-height: 1.2; }
        .subtitle { color: #64748b; font-size: 0.9rem; }

        /* Drive Links Styling */
        .drive-links-card {
            background: var(--soft-gray);
            border-radius: 20px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-color);
        }

        .drive-links-card h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .drive-link {
            background: white;
            padding: 0.85rem 1rem;
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid var(--border-color);
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .drive-link:hover {
            border-color: var(--info-blue);
            box-shadow: 0 4px 12px rgba(69, 123, 157, 0.1);
        }

        /* Toggle Button Styling */
        .toggle-container {
            display: flex;
            justify-content: center;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 12px;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 2rem;
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            background: transparent;
            color: #64748b;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .toggle-btn.active {
            background: white;
            color: var(--info-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Table & Responsive Card Styling */
        .table-container {
            display: none;
        }

        .table-container.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        /* Desktop Table View */
        .desktop-table {
            display: none;
            width: 100%;
            border-collapse: collapse;
        }

        .desktop-table th {
            background: #f8fafc;
            text-align: left;
            padding: 1rem;
            border-bottom: 2px solid var(--border-color);
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .desktop-table td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        /* Mobile Card View */
        .mobile-cards {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .course-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .course-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .course-code {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
        }

        .course-name {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
            line-height: 1.3;
        }

        .course-desc {
            font-size: 0.70rem;
            color: #64748b;
            line-height: 1.5;
        }

        .course-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
            padding-top: 0.75rem;
            border-top: 1px dashed var(--border-color);
        }

        .credits {
            font-weight: 600;
            color: #475569;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--info-blue);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        /* Responsive Breakpoints */
        @media (min-width: 768px) {
            body { padding: 2rem; }
            .container { padding: 2.5rem; }
            h1 { font-size: 1.8rem; }
            .desktop-table { display: table; }
            .mobile-cards { display: none; }

            .back-btn {
                position: absolute;
                top: 2rem;
                left: 2rem;
                margin-bottom: 0;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            color: var(--accent-orange);
            margin-bottom: 1.5rem;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .back-nav:hover { transform: translateX(-5px); }

        .course-file-header {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.85rem;
            line-height: 1.3;
        }

    </style>
</head>
<body>

<div class="container">
    <a href="/academic-journey/index.html" class="back-nav">
        <i data-lucide="arrow-left"></i> Back to Home
    </a>

    <header>
        <h1>Course Timetable and Description</h1>
    </header>

    <section class="drive-links-card">
        <h3><i data-lucide="calendar"></i> Full Timetables</h3>
        <div class="links-grid">
            <a href="https://drive.google.com/drive/folders/1ef-NpKOy6lFb9UbaM9N3tBjsRNcIfRZH?usp=drive_link" target="_blank" class="drive-link">
                <span>Semester 1 / 2025</span>
                <i data-lucide="external-link" size="16"></i>
            </a>
            <a href="https://drive.google.com/drive/folders/1j_QS8jNdrEVnP3j2W8gq7r0PPXlXqnRW?usp=sharing" target="_blank" class="drive-link">
                <span>Semester 2 / 2025</span>
                <i data-lucide="external-link" size="16"></i>
            </a>
        </div>

		<div class="drive-link">
        <i data-lucide="alert-triangle"></i>
        <div>
            <strong>Important: Check the course requirement for your study track <a href="/academic-journey/new-students/study-plans.html" target="_blank"> <span>here</span></strong>
        </div>
    </div>
    </section>

	<div class="toggle-container">
        <button class="toggle-btn active" onclick="switchSemester(1)">Semester 1</button>
        <button class="toggle-btn" onclick="switchSemester(2)">Semester 2</button>
    </div>

    <!-- SEMESTER 1 -->
    <div id="sem1" class="table-container active">
        <!-- Desktop Table -->
        <table class="desktop-table">
            <thead>
                <tr>
                    <th width="12%">Code</th>
                    <th width="75%">Course Name & Description</th>
                    <th width="13%">Credits</th>
                </tr>
            </thead>
            <tbody id="sem1TableBody">
                
            </tbody>
        </table>

        <!-- Mobile Cards -->
        <div class="mobile-cards" id="sem1MobileDivBody">
            
        </div>
    </div>

    <!-- SEMESTER 2 -->
    <div id="sem2" class="table-container">
        <!-- Desktop Table -->
        <table class="desktop-table">
            <thead>
                <tr>
                    <th width="12%">Code</th>
                    <th width="75%">Course Name & Description</th>
                    <th width="13%">Credits</th>
                </tr>
            </thead>
            <tbody id="sem2TableBody">
                
            </tbody>
        </table>

        <!-- Mobile Cards -->
        <div class="mobile-cards" id="sem2MobileDivBody">
            
        </div>
    </div>
</div>

<script>

    function switchSemester(sem) {
        document.querySelectorAll('.toggle-btn').forEach((btn, index) => {
            if (index + 1 === sem) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        document.querySelectorAll('.table-container').forEach(table => {
            table.classList.remove('active');
        });
        document.getElementById(`sem${sem}`).classList.add('active');
    }

/*Desktop*/
    function addCourseToTable(course, tableId) {
        const tableBody = document.getElementById(tableId);
        const tr = document.createElement("tr");
        tr.innerHTML = `
                <td><span class="course-code">${course.code}</span></td>
                <td>
                <span class="course-name">${course.name}</span>
                <div class="course-desc">${course.desc}</div>
                </td>
                <td><span class="credits">${course.credits}</span></td>
        `;
        tableBody.appendChild(tr);
    }

/*Mobile*/
    function addCourseToMobileDiv(course, mobileDivId) {
        const mobileDivBody = document.getElementById(mobileDivId);
        const div = document.createElement("div");
        div.innerHTML = `
            <div class="course-card">
                <div class="course-header">
                    <span class="course-code">${course.code}</span>
                    <span class="credits">${course.credits}</span>
                </div>
                <div class="course-name">${course.name}</div>
                <div class="course-desc">${course.desc}</div>
            </div>
        `;
        mobileDivBody.appendChild(div);
    }

    let sem1Courses = [
	{code: "SCBC 604", name: "Biochemistry Seminar I", desc: "Literature search in biochemistry and molecular biology topic related to student’s thesis; analysis and identification of research questions; experimental design to prove research questions; discussion the biochemistry research topic of interest using international publication", credits:"1(1-0-2)", link: ""},
	{code: "SCBC 607", name: "Current Topics in Biochemistry", desc: "Topics that are of current interest and of importance in biochemical research, such as synthetic biology; DNA recombination techniques; genome editing", credits:"3(3-0-6)", link: ""},
	{code: "SCBC 609", name: "Structure and Mechanism of Enzymes", desc: "Enzymes, enzyme structure, enzyme mechanism; protein and enzyme structure determination; molecular visualization; protein engineering; protein simulation; enzyme innovation", credits:"2(2-0-4)", link: ""},
	{code: "SCBC 610", name: "Modern Metabolism", desc: "Cellular signaling controlling metabolism; posttranslational regulation of metabolism; tissue and organ specific metabolism; iron metabolism; cholesterol and drug transport; metabolomic database; nanotechnology in metabolism", credits:"2(2-0-4)", link: ""},
	{code: "SCBC 612", name: "Functional Genetics and Genomics", desc: "Functional genetics; different levels of gene expression control; DNA replication and repair; RNA biosynthesis and processing; translational control and microRNA; advanced molecular techniques for functional genetics; 4D nucleosome", credits:"2(2-0-4)", link: ""},
	{code: "SCBC 614", name: "Advanced Biochemistry Seminar I", desc: "Literature search in biochemistry and molecular biology topic related to student’s dissertation; analysis and identification of research questions; experimental design to prove research questions; discussion the biochemistry research topic of interest using international publication", credits:"1(1-0-2)", link: ""},
	{code: "SCID 500", name: "Cell and Molecular Biology", desc: "Cell structure and function; life and information flow in cell; energy flow in biosystem; cell signaling; cell division; cellular differentiation; cell death and development", credits:"3(3-0-6)", link: ""},
	{code: "SCID 502", name: "Cell Science", desc: "Mechanism of cellular trafficking and processing among organelles; cellular communication, recognition, adhesion and interaction; cell cycle and controls of cellular differentiation and cancer; cellular signal transduction; cellular response to stress; cell injury, senescence, cell death; cell-microbe interaction; cellular immune responses; molecular pathogenesis of some diseases", credits:"2(2-0-4)", link: ""},
	{code: "SCID 503", name: "Systemic Bioscience", desc: "Homeostasis; integumentary and immune systems; nervous system, musculoskeletal system; cardiovascular system; respiratory system; urinary system; digestive system; endocrine system; reproductive system; integration of systemic bioscience", credits:"3(3-0-6)", link: ""},
	{code: "SCID 506", name: "Concepts of Molecular Bioscience", desc: "Biochemical and biophysical processes of living systems; structures and functions of biological molecules; manipulation of energy and metabolites in biological systems; regulation and expression process of genetic materials", credits:"2(2-0-4)", link: ""},
	{code: "SCID 508", name: "Biomolecular and Spectroscopy Techniques", desc: "Absorbance and fluorescence spectroscopy; mass spectroscopy; nuclear magnetic resonance spectroscopy; biomolecular spectroscopy; laboratory rules and regulations", credits:"1(0-2-1)", link: ""},
	{code: "SCID 511", name: "Gene Technology", desc: "Gene manipulation and recombinant techniques; basic knowledge to understand the principles of gene technology; mini-projects involving handling of nucleic acids and proteins; evaluation of the quality of data generated; laboratory rules and regulations", credits:"1(0-2-1)", link: ""},
	{code: "SCID 518", name: "Generic Skills in Science Research", desc: "Qualities of a good researcher; effective searching of the scientific information; laboratory safety, biosafety, chemical safety, radiation safety, electrical safety; ethics of research in human subjects; experimental animals in science; intellectual property rights; research misconduct; attribution of credit and responsibility; techniques in formulating and writing thesis proposals, research projects, grant applications, research reports and manuscript for publication", credits:"1(1-0-2)", link: ""},
    ];

    let sem2Courses = [
	{code: "SCBC 603", name: "Advanced Biochemistry Laboratory", desc: "Laboratory techniques related to biochemical research, including assays of protein quantity and enzyme activity, gene expression levels, cell cultures; introduction to research methodologies in biochemical research", credits:"2(0-4-2)", link: ""},
	{code: "SCBC 606", name: "Biochemistry Seminar II", desc: "Update of thesis progress, review of scientific articles; extensive review of scientific articles; effective abstract writing and oral presentation; providing and taking critics from peers; future directions and applications", credits:"1(1-0-2)", link: ""},
	{code: "SCBC 611", name: "Current Protocols in Biomolecular Research", desc: "Current biochemical and biomolecular techniques; their applications in studying biomolecular functions; advantages and limitations of the techniques", credits:"1(1-0-2)", link: ""},
	{code: "SCBC 613", name: "Advanced Skills in Biochemical Research", desc: "Transferable skills required by researchers to independently conduct and communicate their research, namely biochemistry proposal writing for the grant for new scholar; critical thinking; extensive literature review; experimental design and basic statistics for biochemists; effective oral presentation and writing of scientific work; research ethics; grant application and reviewing process; discussion of biochemistry proposal", credits:"3(3-0-6)", link: ""},
	{code: "SCBC 615", name: "Advanced Biochemistry Seminar II", desc: "Preparation and presentation of the research proposal; extensive review of scientific articles; effective abstract writing and oral presentation; providing and taking critics from peers", credits:"1(1-0-2)", link: ""},
	{code: "SCBC 616", name: "Advanced Biochemistry Seminar III", desc: "Update of dissertation progress; extensive review of scientific articles; effective abstract writing and oral presentation; providing and taking critics from peers; future directions and applications", credits:"1(1-0-2)", link: ""},
	{code: "SCBC 617", name: "Bioinformatics and Molecular Systems Biology", desc: "Bioinformatics; systems biology; DNA sequence analysis methods; genome and genome variations; metagenomics; transcriptomics; proteomics; metabolomics; protein structure analyses; protein-ligand modeling; single-cell biology; synthetic biology", credits:"2(2-0-4)", link: ""},
	{code: "SCBC 618", name: "Stem Cell and Cancer Bioscience", desc: "Frontier bioscience in stem cells and cancers; concept of regenerative medicine; advances in cancer biomarkers; in-depth knowledges of cancer signaling; tumor angiogenesis; metastasis; cancer stem cells; cancer immunology and immunotherapy", credits:"3(3-0-6)", link: ""},
	{code: "SCBC 619", name: "Integrated Skills in Biochemical Research", desc: "Transferable skills required by researchers to independently conduct and communicate their research, such as extensive search and review of literatures in biochemistry; critical and logical thinking; research ethics; experimental design to prove research questions; research data analysis; sensible discussion and summary of data; application of biochemistry knowledge in private sectors and industries; site visit; intellectual property law; time management; presentation and experience sharing", credits:"3(3-0-6)", link: ""},
	{code: "SCID 507", name: "Microscopic Technique", desc: "Structure and operation of light microscope; phase, dark field and differential interference contrast microscopes; confocal microscope; fluorescence microscope; transmission electron microscope (TEM); scanning electron microscope (SEM); specimen collection; fixation; sectioning; basic staining and immunocytochemical methods for microscopic examination; photography and interpretation of the results; laboratory rules and regulations", credits:"1(0-2-2)", link: ""},
	{code: "SCID 509", name: "Separation Techniques", desc: "Protein purification; ammonium sulfate precipitation; centrifugation; electrophoresis; chromatography, affinity chromatography, ion exchange chromatography, size exclusion chromatography, hydrophobic interaction chromatography, high performance liquid chromatography", credits:"1(0-2-1)", link: ""},
	{code: "SCID 510", name: "Immunological Methods", desc: "Basic principles and applications of immunological methods enzyme-linked immunosorbent assay; SDS-PAGE and immunoblotting; direct and indirect immunofluorescence assays; immunoelectron microscopy; immunoprecipitation; peripheral blood mononuclear white blood cell preparation; flow cytometry and cell sorting; laboratory rules and regulations", credits:"1(0-2-2)", link: ""},
	{code: "SCID 512", name: "Receptor Binding and Enzyme Kinetic Assays", desc: "Receptor-drug interaction; receptor preparation; saturation binding experiment; characterization of drugs and receptors by competitive binding experiments; analysis of binding data using computerized program; techniques in enzyme kinetic analysis; analytical enzymology; laboratory rules and regulations", credits:"1(0-2-2)", link: ""},
    ];

    for(const course of sem1Courses)
        addCourseToTable(course, "sem1TableBody");
    for(const course of sem2Courses)
        addCourseToTable(course, "sem2TableBody");

    for(const course of sem1Courses)
	addCourseToMobileDiv(course, "sem1MobileDivBody");
    for(const course of sem2Courses)
	addCourseToMobileDiv(course, "sem2MobileDivBody");
	
    lucide.createIcons();
</script>
</body>
</html>
